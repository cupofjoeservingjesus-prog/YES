<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YES | Neural Video Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet" />
    
    <style>
      :root { --gold: #D4AF37; --onyx: #050505; }
      
      body {
        background-color: var(--onyx);
        margin: 0;
        /* The Luxury Mesh Gradient */
        background: 
          radial-gradient(at 0% 0%, rgba(212, 175, 55, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(30, 41, 59, 0.4) 0px, transparent 50%),
          #050505;
        background-attachment: fixed;
        min-height: 100vh;
      }

      /* Superior Detail: The Cinematic Film Grain */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        filter: contrast(150%) brightness(1000%);
        opacity: 0.03;
        pointer-events: none;
        z-index: 9999;
      }

      .gold-shimmer {
        background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 45%, #AA771C 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 8s linear infinite;
      }

      @keyframes shine {
        to { background-position: 200% center; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
